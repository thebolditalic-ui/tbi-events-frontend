<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Happening in SF — The Bold Italic</title>
  <meta name="description" content="The Bold Italic's guide to the greatest events in San Francisco and the Bay Area.">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700,800&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       TBI Events — Complete Styles
       Matches thebolditalic.com/events-in-sf/
       ============================================ */

    :root {
      --epcl-title-font-family: 'Playfair Display', 'Times New Roman', serif;
      --epcl-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-serif: Georgia, 'Times New Roman', serif;
      --epcl-titles-color: #1E1B1B;

      --bg-primary: #fff6e6;
      --bg-card: rgb(237, 231, 223);
      --bg-alt-row: rgb(237, 227, 213);
      --bg-hover: rgba(255, 214, 130, 0.18);
      --bg-placeholder: rgb(214, 207, 198);

      --text-primary: #1E1B1B;
      --text-secondary: #888;
      --text-label: rgb(107, 99, 96);
      --text-detail-label: rgb(122, 114, 105);

      --color-free: rgb(0, 119, 182);
      --color-free-detail: rgb(45, 138, 78);
      --color-sold-out: rgb(230, 57, 70);
      --color-cta: rgb(17, 17, 17);
      --color-cta-hover: rgb(51, 51, 51);
      --color-cta-green: rgb(166, 227, 161);
      --color-cta-green-hover: rgb(148, 217, 144);
      --color-soldout-bg: rgb(224, 213, 204);

      --border-card: rgb(221, 213, 203);
      --border-divider: rgb(229, 229, 229);

      --cat-all: rgb(205, 214, 244);
      --cat-art: rgb(166, 227, 161);
      --cat-comedy: rgb(249, 226, 175);
      --cat-festivals: rgb(249, 226, 175);
      --cat-food: rgb(250, 179, 135);
      --cat-music: rgb(203, 166, 247);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      font-family: var(--epcl-font-family);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ---- Page Header ---- */
    .tbi-header {
      text-align: center;
      padding: 40px 20px 10px;
      max-width: 1290px;
      margin: 0 auto;
    }
    .tbi-header h1 {
      font-family: var(--epcl-title-font-family);
      font-size: 46px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .tbi-header .diamond { margin: 0 6px; opacity: 0.5; }
    .tbi-header .ev-star { display: inline-block; }
    .tbi-header .ev-star-lg {
      font-size: 18px;
      color: #f4b8a4;
      -webkit-text-stroke: 0.5px #1E1B1B;
      vertical-align: super;
      margin-left: 2px;
      position: relative;
      top: -4px;
    }
    .tbi-header .ev-star-sm {
      font-size: 12px;
      color: #d4c0a8;
      -webkit-text-stroke: 0.5px #1E1B1B;
      vertical-align: middle;
      margin-right: 3px;
    }
    .tbi-header .subtitle {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.05rem;
      color: var(--epcl-text-color, #3B3A3A);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.55;
    }
    .tbi-header .subtitle a.ev-header-link {
      color: #1E1B1B;
      text-decoration: underline;
      font-size: 15px;
      font-style: italic;
    }
    .tbi-header .subtitle a.ev-header-link:hover {
      color: #e07b5f;
    }
    .tbi-header {
      margin-bottom: 30px;
    }

    /* ---- Main Container ---- */
    #tbi-events {
      max-width: 1290px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ---- Section Head (location tabs + month pills) ---- */
    .ev-section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px auto 20px;
      max-width: 1050px;
      box-sizing: border-box;
    }
    .ev-section-head h2 {
      font-family: var(--epcl-title-font-family);
      font-weight: 800;
      font-size: 22px;
      color: var(--epcl-titles-color, #1E1B1B);
      margin: 0;
      white-space: nowrap;
    }
    .ev-line {
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.07);
    }
    /* ---- Location tabs ---- */
    .ev-loc-tab {
      font-family: var(--epcl-title-font-family);
      font-weight: 800;
      font-size: 22px;
      color: var(--epcl-titles-color, #1E1B1B);
      margin: 0;
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.2s, opacity 0.2s;
    }
    .ev-loc-inactive {
      font-weight: 400;
      font-size: 18px;
      opacity: 0.45;
      color: #6b6360;
      cursor: pointer;
    }
    .ev-loc-inactive:hover {
      opacity: 0.7;
    }
    /* ---- Month filter pills ---- */
    .ev-month-pill {
      padding: 6px 16px;
      border-radius: 100px;
      border: none;
      background: #ede3d5;
      font-family: var(--epcl-title-font-family);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #1E1B1B;
      transition: all 300ms ease;
      opacity: 0.7;
    }
    .ev-month-pill:hover {
      opacity: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }
    .ev-month-pill.active {
      opacity: 1;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* ---- Filter Row ---- */
    .ev-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1050px;
      margin: 16px auto 10px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ev-filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      padding: 10px 0;
      max-width: 1050px;
      margin: 0 auto;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .ev-filter-label {
      font-family: var(--epcl-font-family);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-label);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ev-filter-row button {
      padding: 6px 16px;
      border-radius: 100px;
      border: none;
      font-family: var(--epcl-title-font-family);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: 300ms;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .ev-filter-row button:hover {
      box-shadow: rgba(0,0,0,0.12) 0px 2px 8px;
      transform: translateY(-1px);
    }
    .ev-filter-row button.active {
      opacity: 1;
      font-weight: 700;
      box-shadow: rgba(0,0,0,0.15) 0px 2px 6px;
    }
    .ev-filter-row button.active:hover {
      box-shadow: rgba(255,214,130,0.4) 0px 2px 10px;
    }

    /* ---- Search ---- */
    .ev-search {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 300px;
      margin-left: auto;
    }
    .ev-search input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgb(200,200,200);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      background: white;
    }
    .ev-search input:focus {
      outline: none;
      border-color: rgb(100,100,100);
      box-shadow: 0 0 0 2px rgba(100,100,100,0.1);
    }
    .ev-search input::placeholder { color: rgb(150,150,150); }
    .ev-search-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgb(200,200,200); border: none; cursor: pointer; transition: 0.2s;
    }
    .ev-search-btn:hover { background: rgb(150,150,150); }
    .ev-search-btn svg { width: 16px; height: 16px; stroke: white; stroke-width: 2; fill: none; }

    /* ---- Date Picker ---- */
    .ev-date-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 1050px;
      margin: 0 auto 16px;
    }
    .ev-datepicker-label {
      font-family: var(--epcl-font-family);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-label);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ev-date-picker select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgb(200,200,200);
      font-size: 14px;
      font-family: inherit;
      background: white;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .ev-date-picker select:hover { border-color: rgb(100,100,100); }
    .ev-date-picker select:focus {
      outline: none; border-color: var(--color-cta);
      box-shadow: 0 0 0 2px rgba(17,17,17,0.1);
    }
    .ev-clear-filter {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgb(200,200,200);
      font-size: 13px;
      font-family: inherit;
      background: white;
      cursor: pointer;
      color: var(--text-label);
      transition: 0.2s;
    }
    .ev-clear-filter:hover { border-color: var(--color-cta); color: var(--text-primary); }

    /* ---- Event List ---- */
    .ev-list {
      max-width: 1050px;
      margin: 20px auto 0;
      padding-bottom: 80px;
    }
    .ev-date-header {
      max-width: 1050px;
      margin: 18px auto 8px;
      padding: 0 4px;
    }
    .ev-date-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-label);
    }

    /* ---- Event Row ---- */
    .ev-row {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: 200ms;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      background: transparent;
    }
    .ev-row-alt { background: var(--bg-alt-row); }
    .ev-row:hover { background: var(--bg-hover); }

    .ev-thumb {
      flex-shrink: 0;
      width: 70px; height: 70px;
      border-radius: 8px;
      overflow: hidden;
    }
    .ev-thumb img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .ev-thumb-empty {
      flex-shrink: 0;
      width: 70px; height: 70px;
    }

    .ev-info { flex: 1 1 0%; min-width: 0; }
    .ev-info h3 {
      font-family: var(--epcl-title-font-family);
      font-weight: 800;
      font-size: 16px;
      line-height: 1.3;
      color: var(--epcl-titles-color);
      margin: 2px 0;
    }
    .ev-catpill {
      display: inline-block;
      font-family: var(--epcl-font-family);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 10px;
      border-radius: 12px;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .ev-meta {
      font-family: var(--epcl-font-family);
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .ev-right {
      flex-shrink: 0;
      text-align: right;
      min-width: 80px;
    }
    .ev-price {
      font-family: var(--epcl-title-font-family);
      font-weight: 700;
      font-size: 14px;
      margin-top: 6px;
      color: var(--color-cta);
    }
    .ev-price.free { color: var(--color-free); }
    .ev-price.soldout { color: var(--color-sold-out); font-weight: 600; }

    /* ---- Featured Badge ---- */
    .ev-row.featured {
      border: 2px solid rgba(255, 214, 130, 0.5);
    }
    .ev-row.sponsored {
      border: 2px solid var(--cat-art);
    }
    .ev-sponsored-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-free-detail);
      margin-bottom: 2px;
    }

    /* ---- Featured Events Section ---- */
    .ev-featured-wrap {
      max-width: 1050px;
      box-sizing: border-box;
      margin: 0 auto 28px;
      background: #ede3d5;
      border: 1px solid #1E1B1B;
      border-radius: 16px;
      padding: 36px 60px 32px;
      position: relative;
    }
    .ev-featured-label {
      position: absolute;
      top: -14px;
      left: 24px;
      background: #f9e2af;
      color: #1E1B1B;
      font-family: var(--epcl-font-family);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid #1E1B1B;
      border-radius: 20px;
      z-index: 2;
    }
    .ev-featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 24px;
    }
    .ev-fcard {
      position: relative;
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      display: block;
    }
    .ev-fcard .ev-fimg {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: #111;
    }
    .ev-fcard .ev-fimg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0.45;
      transition: opacity 0.4s, transform 0.6s;
    }
    .ev-fcard:hover .ev-fimg img {
      opacity: 0.6;
      transform: scale(1.03);
    }
    .ev-fcard .ev-foverlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 50px 24px 20px;
      z-index: 2;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .ev-fcard .ev-foverlay .ev-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 10px;
      font-family: var(--epcl-font-family);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1E1B1B;
    }
    .ev-fcard .ev-foverlay h2 {
      font-family: var(--epcl-title-font-family);
      font-size: 22px;
      font-weight: 800;
      color: #f5f0e8;
      line-height: 1.3;
      margin: 8px 0 0;
    }
    .ev-fcard .ev-foverlay p {
      font-family: Georgia, serif;
      font-size: 14px;
      color: #ddd8d0;
      line-height: 1.55;
      margin: 10px 0 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (max-width: 1200px) {
      .ev-featured-grid { grid-template-columns: repeat(2, 1fr); gap: 0 30px; }
    }
    @media (max-width: 900px) {
      .ev-featured-grid { grid-template-columns: 1fr; gap: 20px 0; }
    }
    @media (max-width: 700px) {
      .ev-featured-wrap { padding: 36px 40px 32px !important; }
      .ev-featured-label { left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; padding: 4px 10px; }
    }

    /* ---- Pagination ---- */
    .ev-pagination {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: var(--text-label);
    }
    .ev-pagination a, .ev-pagination span.pg {
      margin: 0 6px;
      color: var(--color-cta);
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .ev-pagination a:hover { color: rgb(100,100,100); }
    .ev-pagination span.pg.active { font-weight: 700; text-decoration: underline; }
    .ev-pagination .pg-info { margin-bottom: 8px; }

    /* ---- Footer Note ---- */
    .ev-footer-note {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-divider);
      max-width: 1050px;
      margin: 0 auto;
    }

    /* ---- Loading State ---- */
    .ev-loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 16px;
      color: var(--text-label);
    }

    /* ============================================
       EVENT DETAIL PAGE STYLES
       ============================================ */
    .ev-post {
      max-width: 820px;
      margin: 0 auto;
      padding: 30px 16px;
      font-family: var(--epcl-font-family);
    }
    .ev-post-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-card);
      margin-bottom: 28px;
    }
    .ev-post-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .ev-post-topbar a {
      font-size: 14px;
      color: rgb(102,102,102);
      text-decoration: none;
      transition: 0.2s;
    }
    .ev-post-topbar a:hover { color: var(--color-cta); }

    .ev-post-hero {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    .ev-post-image {
      flex: 0 0 45%;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    .ev-post-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .ev-post-details {
      flex: 1 1 0%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ev-post-cat {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-cta);
      letter-spacing: 0.02em;
      align-self: flex-start;
    }
    .ev-post-title {
      font-family: var(--epcl-title-font-family);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--text-primary);
      margin: 4px 0;
    }
    .ev-post-detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 4px 0;
    }
    .ev-post-detail-icon {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }
    .ev-post-detail-text { flex: 1; }
    .ev-post-detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-detail-label);
      margin-bottom: 1px;
    }
    .ev-post-detail-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-cta);
      line-height: 1.35;
    }
    .ev-post-detail-value.free { color: var(--color-free-detail); font-weight: 700; }
    .ev-post-detail-value.soldout { color: var(--color-sold-out); font-weight: 700; }

    .ev-post-cta {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 28px;
      background: var(--color-cta-green);
      color: var(--text-primary) !important;
      text-decoration: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      transition: 200ms;
      align-self: flex-start;
      cursor: pointer;
      border: none;
      letter-spacing: 0.02em;
    }
    .ev-post-cta:hover {
      background: var(--color-cta-green-hover);
      transform: translateY(-1px);
    }
    .ev-post-cta.soldout {
      background: var(--color-soldout-bg);
      color: var(--text-secondary) !important;
      cursor: default;
      pointer-events: none;
    }

    .ev-post-divider {
      border-top: 1px solid var(--border-divider);
      margin: 28px 0;
    }
    /* ---- "EVENT DESCRIPTION" pill divider (matches Ghost detail page) ---- */
    .ev-desc-header {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 8px;
      margin-bottom: 20px;
    }
    .ev-desc-header::before, .ev-desc-header::after {
      content: "";
      flex: 1;
      height: 0;
      border-top: 0.5px solid #333;
    }
    .ev-desc-pill {
      font-family: var(--epcl-font-family);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b5e50;
      background: #faf8f5;
      border: 0.5px solid #333;
      padding: 5px 20px;
      border-radius: 20px;
      white-space: nowrap;
    }
    /* ---- No-image card variant ---- */
    .ev-post-card.no-image { max-width: 460px; margin-left: auto; margin-right: auto; }
    .ev-post-card.no-image .ev-post-hero { flex-direction: column; justify-content: center; align-items: center; }
    .ev-post-card.no-image .ev-post-image { display: none; }
    .ev-post-card.no-image .ev-post-details { flex: 1; width: 100%; }
    .ev-post-body {
      max-width: 680px;
      margin: 0 auto;
    }
    .ev-post-body p {
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1.65;
      color: rgb(34,34,34);
      margin-bottom: 16px;
    }
    .ev-post-source {
      font-size: 13px;
      color: rgb(153,153,153);
      border-top: 1px solid rgb(238,238,238);
      padding-top: 16px;
      margin-top: 32px;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }
    .ev-post-source a { color: rgb(102,102,102); text-decoration: underline; transition: 0.2s; }

    .ev-post-back {

    /* ---- Broken Image Placeholder ---- */

    /* ---- Event Detail Page Header ---- */
    .ev-post-header {

    .ev-post-header-date {
      font-family: var(--epcl-font-family);

    .ev-post-header-title {
      font-family: var(--epcl-title-font-family);
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      max-width: 700px;
      margin: 0 auto 8px;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 1024px) {
      .ev-filter-row { flex-wrap: wrap; }
      .ev-row { gap: 12px; }
      .ev-post-hero { flex-direction: column; }

    @media (max-width: 768px) {
      #tbi-events { padding: 0 16px; }
      .tbi-header h1 { font-size: 32px; }
      .ev-filter-row {
        gap: 8px; padding: 10px 0;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
      }
      .ev-filter-row button { padding: 4px 12px; font-size: 12px; }
      .ev-post { padding: 20px 12px; }
      .ev-post-card { padding: 16px; }
      .ev-post-hero { gap: 16px; }
      .ev-row { padding: 10px 12px; gap: 12px; }
      .ev-thumb { width: 60px; height: 60px; }
      .ev-info h3 { font-size: 14px; }
      .ev-meta { font-size: 12px; }
      .ev-search { max-width: 100%; margin-left: 0; margin-top: 12px; }

      .ev-section-head .ev-loc-tab { font-size: 18px; }

      .ev-line { display: none; }
      .ev-section-head .ev-month-pill:first-of-type { margin-left: 0; }
      .ev-section-head .ev-loc-tab:last-of-type { margin-right: auto; }
    }
    @media (max-width: 480px) {
      #tbi-events { padding: 0 12px; }
      .tbi-header h1 { font-size: 24px; }

      .ev-filter-row button { padding: 3px 8px; font-size: 10px; }
      .ev-thumb { width: 50px; height: 50px; }
      .ev-info h3 { font-size: 13px; }

    @media print {
      .ev-search, .ev-filter-row, .ev-date-picker, .ev-pagination, .ev-post-cta { display: none !important; }
      .ev-row { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ============================================
    // CONFIG — Replace with your Supabase credentials
    // ============================================
    const SUPABASE_URL = 'https://scawgrjcjgcmvsimvash.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjYXdncmpjamdjbXZzaW12YXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzAxMDIsImV4cCI6MjA4ODM0NjEwMn0.lmks8ntJPZ0giQEpuH3tSSBllzmOj20oUrb96kBIdh0';
    const EVENTS_PER_PAGE = 40;

    // ============================================
    // CATEGORY COLORS
    // ============================================
    const CATEGORY_COLORS = {
      'Art & Culture': 'rgb(166, 227, 161)',
      'Comedy': 'rgb(249, 226, 175)',
      'Festivals': 'rgb(249, 226, 175)',
      'Food & Drink': 'rgb(250, 179, 135)',
      'Music': 'rgb(203, 166, 247)',
      'Events': 'rgb(205, 214, 244)',
      'default': 'rgb(205, 214, 244)'
    };

    function getCategoryColor(cat) {
      if (!cat) return CATEGORY_COLORS['default'];
      return CATEGORY_COLORS[cat] || CATEGORY_COLORS['default'];
    }

    // Known source name → URL mapping (scraper stores name but not URL)
    const SOURCE_URLS = {
      'SF Funcheap': 'https://sf.funcheap.com',
      'Eventbrite': 'https://www.eventbrite.com',
      'SF Station': 'https://www.sfstation.com',
    };

    function getSourceUrl(event) {
      if (event.source_url) return event.source_url;
      if (event.source_name && SOURCE_URLS[event.source_name]) return SOURCE_URLS[event.source_name];
      return '';
    }

    // ============================================
    // SUPABASE DATA LAYER
    // ============================================
    async function supabaseFetch(path) {
      const resp = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      if (!resp.ok) throw new Error(`Supabase error: ${resp.status}`);
      return resp.json();
    }

    async function fetchEvents({ category, city, search, filterMonth, filterDay, limit = EVENTS_PER_PAGE, offset = 0 } = {}) {
      const now = new Date().toISOString();
      let query = `events?select=*&order=event_date.asc,title.asc&limit=${limit}&offset=${offset}`;
      if (filterMonth) {
        // Filter to specific month (and optionally day)
        const [y, m] = filterMonth.split('-');
        if (filterDay) {
          const dayStr = String(filterDay).padStart(2, '0');
          const startDate = `${y}-${m}-${dayStr}T00:00:00`;
          const nextDay = new Date(parseInt(y), parseInt(m) - 1, parseInt(filterDay) + 1);
          const endDate = `${nextDay.getFullYear()}-${String(nextDay.getMonth()+1).padStart(2,'0')}-${String(nextDay.getDate()).padStart(2,'0')}T00:00:00`;
          query += `&event_date=gte.${startDate}&event_date=lt.${endDate}`;
        } else {
          const startDate = `${y}-${m}-01T00:00:00`;
          const nextMonth = new Date(parseInt(y), parseInt(m), 1);
          const endDate = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth()+1).padStart(2,'0')}-01T00:00:00`;
          query += `&event_date=gte.${startDate}&event_date=lt.${endDate}`;
        }
      } else {
        query += `&event_date=gte.${now}`;
      }
      if (category && category !== 'all') query += `&category=eq.${encodeURIComponent(category)}`;
      if (city && city !== 'all') query += `&city=eq.${city}`;
      if (search) query += `&title=ilike.*${encodeURIComponent(search)}*`;
      return supabaseFetch(query);
    }

    async function fetchEventCount({ category, city, search, filterMonth, filterDay } = {}) {
      const now = new Date().toISOString();
      let query = `events?select=id`;
      if (filterMonth) {
        const [y, m] = filterMonth.split('-');
        if (filterDay) {
          const dayStr = String(filterDay).padStart(2, '0');
          const startDate = `${y}-${m}-${dayStr}T00:00:00`;
          const nextDay = new Date(parseInt(y), parseInt(m) - 1, parseInt(filterDay) + 1);
          const endDate = `${nextDay.getFullYear()}-${String(nextDay.getMonth()+1).padStart(2,'0')}-${String(nextDay.getDate()).padStart(2,'0')}T00:00:00`;
          query += `&event_date=gte.${startDate}&event_date=lt.${endDate}`;
        } else {
          const startDate = `${y}-${m}-01T00:00:00`;
          const nextMonth = new Date(parseInt(y), parseInt(m), 1);
          const endDate = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth()+1).padStart(2,'0')}-01T00:00:00`;
          query += `&event_date=gte.${startDate}&event_date=lt.${endDate}`;
        }
      } else {
        query += `&event_date=gte.${now}`;
      }
      if (category && category !== 'all') query += `&category=eq.${encodeURIComponent(category)}`;
      if (city && city !== 'all') query += `&city=eq.${city}`;
      if (search) query += `&title=ilike.*${encodeURIComponent(search)}*`;
      const data = await supabaseFetch(query);
      return data.length;
    }

    async function fetchCategories() {
      const now = new Date().toISOString();
      const data = await supabaseFetch(`events?select=category&event_date=gte.${now}`);
      const counts = {};
      data.forEach(e => {
        const c = e.category || 'Events';
        counts[c] = (counts[c] || 0) + 1;
      });
      return counts;
    }

    async function fetchEventBySlug(slug) {
      const data = await supabaseFetch(`events?slug=eq.${encodeURIComponent(slug)}&limit=1`);
      return data[0] || null;
    }

    // ============================================
    // GHOST CONTENT API (for Featured section)
    // ============================================
    const GHOST_URL = 'https://the-bold-italic.ghost.io';
    const GHOST_CONTENT_KEY = '53dbcc02d5748f0a74e48cd3cc';

    async function fetchFeaturedFromGhost() {
      try {
        const url = `${GHOST_URL}/ghost/api/content/posts/?key=${GHOST_CONTENT_KEY}`
          + `&filter=tag:hash-featuredevent`
          + `&limit=6&include=tags&formats=html`
          + `&fields=id,slug,title,url,feature_image,custom_excerpt,html`;
        const resp = await fetch(url);
        const data = await resp.json();
        if (!data.posts || data.posts.length === 0) return [];
        return data.posts.map(post => {
          let category = 'Events';
          (post.tags || []).forEach(t => {
            if (t.name.startsWith('#') && t.name !== '#featuredevent' && t.name !== '#eventscal' && t.name !== '#events' && t.name !== '#hidden') {
              category = t.name.slice(1);
            }
          });
          return {
            title: post.title,
            url: post.url,
            image: post.feature_image || '',
            category: category,
            catColor: getCategoryColor(category),
            excerpt: post.custom_excerpt || ''
          };
        });
      } catch (err) {
        console.warn('Failed to fetch featured posts from Ghost:', err);
        return [];
      }
    }

    function renderFeaturedSection(featured) {
      if (!featured || featured.length === 0) return '';
      const cards = featured.slice(0, 3);
      let html = `<div class="ev-featured-wrap">
        <span class="ev-featured-label">Featured Bay Area Events, Reviews &amp; Guides</span>
        <div class="ev-featured-grid">`;
      cards.forEach(item => {
        html += `<a href="${esc(item.url)}" class="ev-fcard" target="_blank" rel="noopener">
          <div class="ev-fimg"><img src="${esc(item.image)}" alt="${esc(item.title)}" onerror="this.style.opacity='0'"></div>
          <div class="ev-foverlay">`;
        if (item.category && item.category !== 'Events') {
          html += `<span class="ev-badge" style="background:${item.catColor}">${esc(item.category)}</span>`;
        }
        html += `<h2>${esc(item.title)}</h2>`;
        if (item.excerpt) html += `<p>${esc(item.excerpt)}</p>`;
        html += `</div></a>`;
      });
      html += `</div></div>`;
      return html;
    }

    // ============================================
    // DATE HELPERS
    // ============================================
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function formatDateHeader(dateStr) {
      const d = new Date(dateStr);
      return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`.toUpperCase();
    }

    function formatEventMeta(event) {
      const parts = [];
      if (event.event_date) {
        const d = new Date(event.event_date);
        parts.push(`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`);
        if (event.time) parts[0] += ` · ${event.time}`;
      } else if (event.date) {
        let s = event.date;
        if (event.time) s += ` · ${event.time}`;
        parts.push(s);
      }
      if (event.venue) parts.push(event.venue);
      else if (event.neighborhood) parts.push(event.neighborhood);
      return parts.join(' · ');
    }

    function formatDetailDate(event) {
      if (event.event_date) {
        const d = new Date(event.event_date);
        let s = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        if (event.time) s += ` · ${event.time}`;
        return s;
      }
      let s = event.date || '';
      if (event.time) s += ` · ${event.time}`;
      return s;
    }

    function getDateKey(event) {
      if (event.event_date) return event.event_date.split('T')[0];
      return event.date || 'unknown';
    }

    // ============================================
    // HTML HELPERS
    // ============================================
    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function imgWithFallback(url, cls, alt) {
      if (!url) return '';
      return `<img src="${esc(url)}" alt="${esc(alt || '')}" loading="lazy" onerror="this.style.display='none'">`;
    }

    function priceHTML(price, soldOut) {
      if (soldOut) return `<div class="ev-price soldout">Sold Out</div>`;
      if (!price) return `<div class="ev-price"></div>`;
      const lower = price.toLowerCase().trim();
      if (lower === 'free' || lower === '$0' || lower === '$0.00') {
        return `<div class="ev-price free">Free</div>`;
      }
      return `<div class="ev-price">${esc(price)}</div>`;
    }

    function priceDetailHTML(price, soldOut) {
      if (soldOut) return `<span class="ev-post-detail-value soldout">Sold Out</span>`;
      if (!price) return `<span class="ev-post-detail-value">—</span>`;
      const lower = price.toLowerCase().trim();
      if (lower === 'free' || lower === '$0' || lower === '$0.00') {
        return `<span class="ev-post-detail-value free">Free</span>`;
      }
      return `<span class="ev-post-detail-value">${esc(price)}</span>`;
    }

    // ============================================
    // STATE
    // ============================================
    let state = {
      category: 'all',
      city: 'sf',
      search: '',
      page: 1,
      total: 0,
      filterMonth: '',
      filterDay: '',
    };

    // ============================================
    // LISTING PAGE
    // ============================================
    async function renderListingPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="tbi-header">
          <h1>What's Happening in SF <span class="ev-star ev-star-lg">✦</span></h1>
          <div class="subtitle"><span class="ev-star ev-star-sm">✦</span> <em>The Bold Italic</em>'s guide to the greatest events in San Francisco and the Bay Area. <a class="ev-header-link" href="https://www.thebolditalic.com/tag/events/" target="_blank" rel="noopener">Read our latest event reviews</a></div>
        </div>
        <div id="tbi-events">
          <div class="ev-loading">Loading events...</div>
        </div>
      `;
      document.title = "What's Happening in SF — The Bold Italic";

      try {
        // Fetch featured posts from Ghost and category counts from Supabase in parallel
        const [categoryCounts, featured] = await Promise.all([
          fetchCategories(),
          fetchFeaturedFromGhost()
        ]);
        const totalAll = Object.values(categoryCounts).reduce((a,b) => a+b, 0);

        const container = document.getElementById('tbi-events');
        container.innerHTML = renderFeaturedSection(featured) + buildControls(categoryCounts, totalAll) + `<div id="ev-results"><div class="ev-loading">Loading events...</div></div>`;

        attachControlListeners();
        await loadEvents();
      } catch (err) {
        console.error('Error loading events:', err);
        document.getElementById('tbi-events').innerHTML = `<div class="ev-loading">Unable to load events. Please try again later.</div>`;
      }
    }

    function buildControls(categoryCounts, totalAll) {
      const now = new Date();

      // Controls row: category filters + search (ABOVE location tabs, matching live site)
      let html = `<div class="ev-controls-row">
        <div class="ev-filter-row">
          <span class="ev-filter-label">Events by Category</span>
          <button data-cat="all" class="${state.category==='all'?'active':''}" style="background:${CATEGORY_COLORS['Events']}">All ${totalAll}</button>`;

      const catOrder = ['Art & Culture', 'Comedy', 'Festivals', 'Food & Drink', 'Music'];
      catOrder.forEach(cat => {
        const count = categoryCounts[cat] || 0;
        if (count > 0) {
          html += `<button data-cat="${esc(cat)}" class="${state.category===cat?'active':''}" style="background:${getCategoryColor(cat)}">${esc(cat)} ${count}</button>`;
        }
      });
      Object.keys(categoryCounts).forEach(cat => {
        if (!catOrder.includes(cat) && cat !== 'Events') {
          html += `<button data-cat="${esc(cat)}" class="${state.category===cat?'active':''}" style="background:${getCategoryColor(cat)}">${esc(cat)} ${categoryCounts[cat]}</button>`;
        }
      });

      html += `</div>
        <div class="ev-search">
          <input type="text" id="ev-search-input" placeholder="Search events..." value="${esc(state.search)}">
          <button class="ev-search-btn" id="ev-search-btn">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>`;

      // Section head: location tabs + month pills + line (BELOW category pills, matching live site)
      html += `<div class="ev-section-head">
        <h2 class="ev-loc-tab${state.city !== 'all' ? ' ev-loc-inactive' : ''}" data-loc="all">All Events</h2>
        <h2 class="ev-loc-tab${state.city !== 'sf' ? ' ev-loc-inactive' : ''}" data-loc="sf">SF Events</h2>
        <h2 class="ev-loc-tab${state.city !== 'oakland' ? ' ev-loc-inactive' : ''}" data-loc="oakland">Oakland Events</h2>`;

      // Month pills — current month + next 2
      for (let i = 0; i < 3; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        html += `<button class="ev-month-pill${state.filterMonth === val ? ' active' : ''}" data-month="${val}">${esc(label)}</button>`;
      }

      html += `<div class="ev-line"></div>
      </div>`;

      // Date picker (filters events, not jump-to-anchor)
      html += `<div class="ev-date-picker">
        <span class="ev-datepicker-label">Jump to date:</span>
        <select class="ev-month-picker" id="ev-month-picker"><option value="">Month</option>`;
      for (let i = 0; i < 6; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        html += `<option value="${val}" ${state.filterMonth===val?'selected':''}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`;
      }
      html += `</select>
        <select class="ev-day-picker" id="ev-day-picker"><option value="">Day</option>`;
      for (let i = 1; i <= 31; i++) {
        html += `<option value="${i}" ${state.filterDay==String(i)?'selected':''}>${i}</option>`;
      }
      html += `</select>
        <button class="ev-clear-filter" id="ev-clear-date">Clear</button>
      </div>`;

      return html;
    }

    function attachControlListeners() {
      // Category filters
      document.querySelectorAll('.ev-filter-row button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.category = btn.dataset.cat;
          state.page = 1;
          updateActiveStates();
          loadEvents();
        });
      });

      // Location tabs (h2 elements with ev-loc-tab class)
      document.querySelectorAll('.ev-loc-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.ev-loc-tab').forEach(t => t.classList.add('ev-loc-inactive'));
          tab.classList.remove('ev-loc-inactive');
          state.city = tab.dataset.loc;
          state.page = 1;
          loadEvents();
        });
      });

      // Month pills
      document.querySelectorAll('.ev-month-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          const clickedMonth = pill.dataset.month;
          if (state.filterMonth === clickedMonth) {
            // Deselect — show all months again
            pill.classList.remove('active');
            state.filterMonth = '';
            state.filterDay = '';
          } else {
            document.querySelectorAll('.ev-month-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            state.filterMonth = clickedMonth;
            state.filterDay = '';
          }
          // Sync the date picker dropdown
          document.getElementById('ev-month-picker').value = state.filterMonth;
          document.getElementById('ev-day-picker').value = '';
          state.page = 1;
          loadEvents();
        });
      });

      // Search
      let searchTimeout;
      document.getElementById('ev-search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          state.search = e.target.value.trim();
          state.page = 1;
          loadEvents();
        }, 400);
      });
      document.getElementById('ev-search-btn').addEventListener('click', () => {
        state.search = document.getElementById('ev-search-input').value.trim();
        state.page = 1;
        loadEvents();
      });

      // Date picker — FILTERS events (not jump-to-anchor)
      document.getElementById('ev-month-picker').addEventListener('change', (e) => {
        state.filterMonth = e.target.value;
        state.filterDay = '';
        document.getElementById('ev-day-picker').value = '';
        // Sync month pills
        document.querySelectorAll('.ev-month-pill').forEach(p => p.classList.remove('active'));
        if (state.filterMonth) {
          const matchPill = document.querySelector(`.ev-month-pill[data-month="${state.filterMonth}"]`);
          if (matchPill) matchPill.classList.add('active');
        }
        state.page = 1;
        loadEvents();
      });
      document.getElementById('ev-day-picker').addEventListener('change', (e) => {
        state.filterDay = e.target.value;
        state.page = 1;
        loadEvents();
      });
      document.getElementById('ev-clear-date').addEventListener('click', () => {
        state.filterMonth = '';
        state.filterDay = '';
        document.getElementById('ev-month-picker').value = '';
        document.getElementById('ev-day-picker').value = '';
        document.querySelectorAll('.ev-month-pill').forEach(p => p.classList.remove('active'));
        state.page = 1;
        loadEvents();
      });
    }

    function updateActiveStates() {
      document.querySelectorAll('.ev-filter-row button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === state.category);
      });
    }

    async function loadEvents() {
      const results = document.getElementById('ev-results');
      results.innerHTML = `<div class="ev-loading">Loading events...</div>`;

      try {
        const offset = (state.page - 1) * EVENTS_PER_PAGE;
        const [events, total] = await Promise.all([
          fetchEvents({ category: state.category, city: state.city, search: state.search, filterMonth: state.filterMonth, filterDay: state.filterDay, limit: EVENTS_PER_PAGE, offset }),
          fetchEventCount({ category: state.category, city: state.city, search: state.search, filterMonth: state.filterMonth, filterDay: state.filterDay })
        ]);
        state.total = total;

        if (events.length === 0) {
          results.innerHTML = `<div class="ev-loading">No events found. Try a different filter or search.</div>`;
          return;
        }

        // Group by date
        let html = `<div class="ev-list">`;
        let currentDate = '';
        let rowIdx = 0;

        // Sort featured/sponsored first
        const sorted = [...events].sort((a, b) => {
          if (a.sponsored && !b.sponsored) return -1;
          if (!a.sponsored && b.sponsored) return 1;
          if (a.featured && !b.featured) return -1;
          if (!a.featured && b.featured) return 1;
          return 0;
        });

        sorted.forEach(event => {
          const dateKey = getDateKey(event);
          if (dateKey !== currentDate) {
            currentDate = dateKey;
            html += `<div class="ev-date-header" data-date="${esc(dateKey)}"><span class="ev-date-label">${formatDateHeader(dateKey)}</span></div>`;
            rowIdx = 0;
          }

          const altClass = rowIdx % 2 === 1 ? ' ev-row-alt' : '';
          const featuredClass = event.featured ? ' featured' : '';
          const sponsoredClass = event.sponsored ? ' sponsored' : '';

          html += `<a class="ev-row${altClass}${featuredClass}${sponsoredClass}" href="/${esc(event.slug)}/">
            ${event.image_url && !event.image_url.startsWith('data:') ? `<div class="ev-thumb"><img src="${esc(event.image_url)}" alt="${esc(event.title || '')}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : '<div class="ev-thumb-empty"></div>'}
            <div class="ev-info">
              ${event.sponsored ? '<div class="ev-sponsored-label">SPONSORED</div>' : ''}
              ${event.category && event.category.toLowerCase() !== 'events' ? `<span class="ev-catpill" style="background:${getCategoryColor(event.category)}">${esc(event.category).toUpperCase()}</span>` : ''}
              <h3>${esc(event.title)}</h3>
              <div class="ev-meta">${esc(formatEventMeta(event))}</div>
            </div>
            <div class="ev-right">${priceHTML(event.price, event.sold_out)}</div>
          </a>`;
          rowIdx++;
        });

        html += `</div>`;

        // Pagination
        const totalPages = Math.ceil(total / EVENTS_PER_PAGE);
        if (totalPages > 1) {
          const from = offset + 1;
          const to = Math.min(offset + EVENTS_PER_PAGE, total);
          html += `<div class="ev-pagination">
            <div class="pg-info">Showing ${from}–${to} of ${total} events</div>`;
          if (state.page > 1) html += `<a onclick="goPage(${state.page-1})">« Prev</a>`;
          for (let p = 1; p <= totalPages; p++) {
            html += `<span class="pg ${p===state.page?'active':''}" onclick="goPage(${p})">${p}</span>`;
          }
          if (state.page < totalPages) html += `<a onclick="goPage(${state.page+1})">Next »</a>`;
          html += `</div>`;
        }

        html += `<div class="ev-footer-note"><p>Events are updated daily. Details may change—check the venue for latest info.</p></div>`;
        results.innerHTML = html;

      } catch (err) {
        console.error('Error loading events:', err);
        results.innerHTML = `<div class="ev-loading">Unable to load events. Please try again later.</div>`;
      }
    }

    function goPage(p) {
      state.page = p;
      loadEvents();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    window.goPage = goPage;

    // ============================================
    // EVENT DETAIL PAGE
    // ============================================
    async function renderEventPage(slug) {
      const app = document.getElementById('app');
      app.innerHTML = `<div class="ev-post"><div class="ev-loading">Loading event...</div></div>`;

      try {
        const event = await fetchEventBySlug(slug);
        if (!event) {
          app.innerHTML = `<div class="ev-post">
            <div class="ev-loading">Event not found.</div>
            <div class="ev-post-back"><a href="/">← All Events</a></div>
          </div>`;
          return;
        }

        document.title = `${event.title} — The Bold Italic Events`;

        const location = [event.venue, event.address, event.neighborhood].filter(Boolean).join(', ');
        const catColor = getCategoryColor(event.category);

        // Format date and time as separate fields (matching live site)
        let detailDate = '';
        let detailTime = event.time || '';
        if (event.event_date) {
          const d = new Date(event.event_date);
          detailDate = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        } else if (event.date) {
          detailDate = event.date;
        }

        let ctaHTML = '';
        if (event.sold_out) {
          ctaHTML = `<span class="ev-post-cta soldout">Sold Out</span>`;
        } else if (event.ticket_url) {
          ctaHTML = `<a class="ev-post-cta" href="${esc(event.ticket_url)}" target="_blank" rel="noopener">More Info &amp; Tickets →</a>`;
        } else if (event.source_url) {
          ctaHTML = `<a class="ev-post-cta" href="${esc(event.source_url)}" target="_blank" rel="noopener">More Info →</a>`;
        }

        let performersHTML = '';
        if (event.performers) {
          performersHTML = `<div class="ev-post-detail-row">
            <div class="ev-post-detail-icon">🎤</div>
            <div class="ev-post-detail-text">
              <div class="ev-post-detail-label">Performers</div>
              <div class="ev-post-detail-value">${esc(event.performers)}</div>
            </div>
          </div>`;
        }

        const hasRealImage = event.image_url && !event.image_url.startsWith('data:');
        const noImageClass = hasRealImage ? '' : ' no-image';

        // Build header pill text — infer actual city from address/venue when possible
        function inferCity(event) {
          const addrStr = [event.address, event.venue].filter(Boolean).join(' ').toLowerCase();
          const bayAreaCities = [
            { match: 'berkeley', label: 'BERKELEY' },
            { match: 'oakland', label: 'OAKLAND' },
            { match: 'san jose', label: 'SAN JOSE' },
            { match: 'san mateo', label: 'SAN MATEO' },
            { match: 'palo alto', label: 'PALO ALTO' },
            { match: 'mountain view', label: 'MOUNTAIN VIEW' },
            { match: 'redwood city', label: 'REDWOOD CITY' },
            { match: 'santa cruz', label: 'SANTA CRUZ' },
            { match: 'sausalito', label: 'SAUSALITO' },
            { match: 'mill valley', label: 'MILL VALLEY' },
            { match: 'marin', label: 'MARIN' },
            { match: 'walnut creek', label: 'WALNUT CREEK' },
            { match: 'emeryville', label: 'EMERYVILLE' },
            { match: 'alameda', label: 'ALAMEDA' },
            { match: 'richmond', label: 'RICHMOND' },
            { match: 'daly city', label: 'DALY CITY' },
            { match: 'south san francisco', label: 'SOUTH SAN FRANCISCO' },
          ];
          for (const c of bayAreaCities) {
            if (addrStr.includes(c.match)) return c.label;
          }
          return null;
        }

        let headerPillText = 'EVENT IN SAN FRANCISCO';
        const cityLower = (event.city || '').toLowerCase();
        if (cityLower === 'oakland') {
          headerPillText = 'EVENT IN OAKLAND';
        } else if (cityLower !== 'sf' && cityLower !== 'san francisco' && cityLower !== '') {
          headerPillText = `EVENT IN ${event.city.toUpperCase()}`;
        } else {
          // city is 'sf' or default — check address/venue for actual Bay Area city
          const inferred = inferCity(event);
          if (inferred) headerPillText = `EVENT IN ${inferred}`;
        }

        app.innerHTML = `
        <div class="ev-post">
          <div class="ev-post-header">
            <div class="ev-post-header-line">
              <span class="ev-post-header-pill">${esc(headerPillText)}</span>
            </div>
            <div class="ev-post-header-date">${esc(detailDate)}</div>
            <h1 class="ev-post-header-title">${esc(event.title)}</h1>
          </div>
          <div class="ev-post-card${noImageClass}">
            <div class="ev-post-topbar">
              ${event.category && event.category.toLowerCase() !== 'events' ? `<span class="ev-post-cat" style="background:${catColor}">${esc(event.category)}</span>` : ''}
              <a href="/">← All Events</a>
            </div>
            <div class="ev-post-hero">
              ${hasRealImage ? `<div class="ev-post-image"><img src="${esc(event.image_url)}" alt="${esc(event.title)}" onerror="this.parentElement.style.display='none'"></div>` : ''}
              <div class="ev-post-details">
                <div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">📅</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Date</div>
                    <div class="ev-post-detail-value">${esc(detailDate)}</div>
                  </div>
                </div>
                ${detailTime ? `<div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">🕑</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Time</div>
                    <div class="ev-post-detail-value">${esc(detailTime)}</div>
                  </div>
                </div>` : ''}
                ${event.venue ? `<div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">📍</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Location</div>
                    <div class="ev-post-detail-value">${esc(event.venue)}</div>
                  </div>
                </div>` : ''}
                ${event.address ? `<div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">🏠</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Address</div>
                    <div class="ev-post-detail-value">${esc(event.address)}</div>
                  </div>
                </div>` : ''}
                ${event.neighborhood ? `<div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">🏘</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Neighborhood</div>
                    <div class="ev-post-detail-value">${esc(event.neighborhood)}</div>
                  </div>
                </div>` : ''}
                <div class="ev-post-detail-row">
                  <div class="ev-post-detail-icon">🎫</div>
                  <div class="ev-post-detail-text">
                    <div class="ev-post-detail-label">Price</div>
                    ${priceDetailHTML(event.price, event.sold_out)}
                  </div>
                </div>
                ${performersHTML}
                ${ctaHTML}
              </div>
            </div>

          </div>

          ${event.description ? `
          <div class="ev-desc-header"><span class="ev-desc-pill">EVENT DESCRIPTION</span></div>
          <div class="ev-post-body">
            ${event.description.split('\n').filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join('')}
          </div>` : ''}

          ${event.source_name || event.source_url ? `
          <div class="ev-post-source">
            See this event also on ${getSourceUrl(event) ? `<a href="${esc(getSourceUrl(event))}" target="_blank" rel="noopener">${esc(event.source_name || 'the original source')}</a>` : esc(event.source_name)}.
            Details may change — check the venue for latest info.
          </div>` : ''}

          <div class="ev-post-back">
            <a href="/">Browse All SF Events</a>
          </div>
        </div>`;

      } catch (err) {
        console.error('Error loading event:', err);
        app.innerHTML = `<div class="ev-post">
          <div class="ev-loading">Unable to load event. Please try again later.</div>
          <div class="ev-post-back"><a href="/">← All Events</a></div>
        </div>`;
      }
    }

    // ============================================
    // CLIENT-SIDE ROUTING
    // ============================================
    function route() {
      const path = window.location.pathname;
      if (path === '/' || path === '') {
        renderListingPage();
      } else {
        const slug = path.replace(/^\//, '').replace(/\/$/, '');
        if (slug) {
          renderEventPage(slug);
        } else {
          renderListingPage();
        }
      }
    }

    // Handle internal navigation without full page reload
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('mailto:') || a.target === '_blank') return;
      e.preventDefault();
      history.pushState(null, '', href);
      route();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    window.addEventListener('popstate', route);

    // Initial load
    route();
  </script>
</body>
</html>
