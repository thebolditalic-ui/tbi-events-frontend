<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Happening in SF — The Bold Italic</title>
  <meta name="description" content="The Bold Italic's guide to the greatest events in San Francisco and the Bay Area.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --epcl-title-font-family: 'Playfair Display', 'Times New Roman', serif;
      --epcl-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-serif: Georgia, 'Times New Roman', serif;
      --epcl-titles-color: #1E1B1B;
      --bg-primary: #fff6e6;
      --bg-card: rgb(237, 231, 223);
      --bg-alt-row: rgb(237, 227, 213);
      --bg-hover: rgba(255,214,130,0.18);
      --epcl-text-color: #3B3A3A;
      --epcl-secondary-color: #FFD682;
      --epcl-border-color: #707070;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-primary); color: var(--epcl-text-color); font-family: var(--epcl-font-family); }
    a { color: inherit; }

    /* =============================================
       TBI Events — exact CSS from Ghost header injection v6
       ============================================= */
    #tbi-events { max-width: 1290px; margin: 0 auto; padding: 0 20px; }
    #tbi-events .ev-header { text-align: center; padding: 15px 0 0; margin-bottom: 30px; }
    #tbi-events .ev-header h1 { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 800; font-size: 38px; line-height: 1.2; color: var(--epcl-titles-color, #1E1B1B); margin: 0 0 10px; }
    #tbi-events a.ev-header-link { color: #1E1B1B; text-decoration: underline; font-size: 15px; font-style: italic; }
    #tbi-events a.ev-header-link:hover { color: #e07b5f; }
    #tbi-events .ev-star { display: inline-block; }
    #tbi-events .ev-star-lg { font-size: 18px; color: #f4b8a4; -webkit-text-stroke: 0.5px #1E1B1B; vertical-align: super; margin-left: 2px; position: relative; top: -4px; }
    #tbi-events .ev-star-sm { font-size: 12px; color: #d4c0a8; -webkit-text-stroke: 0.5px #1E1B1B; vertical-align: middle; margin-right: 3px; }
    #tbi-events .ev-header p { font-family: Georgia, 'Times New Roman', serif; font-size: 1.05rem; color: var(--epcl-text-color, #3B3A3A); max-width: 480px; margin: 0 auto; line-height: 1.55; }
    #tbi-events .ev-filter-row { display: flex; align-items: center; gap: 12px; justify-content: center; padding: 10px 0 10px; max-width: 1050px; margin: 0 auto; flex-wrap: nowrap; }
    #tbi-events .ev-filter-label { font-family: var(--epcl-font-family, sans-serif); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #6b6360; white-space: nowrap; flex-shrink: 0; }
    #tbi-events .ev-cattab-wrap { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; flex: 1; min-width: 0; }
    #tbi-events .ev-filter-row button { padding: 6px 16px; border-radius: 100px; border: none; font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-size: 14px; font-weight: 600; cursor: pointer; color: #1E1B1B; transition: all 300ms ease; opacity: 0.7; }
    #tbi-events .ev-filter-row button:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); transform: translateY(-1px); }
    #tbi-events .ev-filter-row button.active { opacity: 1; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    #tbi-events .ev-filter-row button.active:hover { box-shadow: 0 2px 10px rgba(255,214,130,0.4); }
    #tbi-events .ev-filter-row .ev-cattab { writing-mode: horizontal-tb !important; transform: none !important; width: auto !important; line-height: normal !important; }
    #tbi-events .ev-search { max-width: 220px; position: relative; flex-shrink: 0; }
    #tbi-events .ev-search input { display: block; width: 100%; box-sizing: border-box; background: #fff; border: 1px solid transparent; border-radius: 100px; padding: 15px 25px 15px 44px; font-size: 16px; font-family: var(--epcl-font-family, 'Quattrocento Sans', sans-serif); color: var(--epcl-text-color, #3B3A3A); outline: none; box-shadow: 0px 2px 5px 0px rgba(0,0,0,0.02); transition: border-color 300ms ease; }
    #tbi-events .ev-search input:focus { border-color: var(--epcl-secondary-color, #FFD682); }
    #tbi-events .ev-search .ev-search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #999; font-size: 16px; pointer-events: none; }
    #tbi-events .ev-section-head { display: flex; align-items: center; gap: 12px; margin: 10px auto 20px; max-width: 1050px; box-sizing: border-box; }
    #tbi-events .ev-section-head h2 { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 800; font-size: 22px; color: var(--epcl-titles-color, #1E1B1B); margin: 0; white-space: nowrap; }
    #tbi-events .ev-line { flex: 1; height: 1px; background: rgba(0,0,0,0.07); }
    #tbi-events .ev-loc-tab { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 800; font-size: 22px; color: var(--epcl-titles-color, #1E1B1B); margin: 0; white-space: nowrap; cursor: pointer; transition: color 0.2s, opacity 0.2s; }
    #tbi-events .ev-loc-inactive { font-weight: 400; font-size: 18px; opacity: 0.45; color: #6b6360; cursor: pointer; }
    #tbi-events .ev-loc-inactive:hover { opacity: 0.7; }
    #tbi-events .ev-month-pill { padding: 6px 16px; border-radius: 100px; border: none; background: #ede3d5; font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-size: 14px; font-weight: 600; cursor: pointer; color: #1E1B1B; transition: all 300ms ease; opacity: 0.7; }
    #tbi-events .ev-month-pill:hover { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.12); transform: translateY(-1px); }
    #tbi-events .ev-month-pill.active { opacity: 1; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    #tbi-events .ev-date-picker { display: flex; align-items: center; gap: 10px; max-width: 1050px; margin: 0 auto 16px; box-sizing: border-box; }
    #tbi-events .ev-datepicker-label { font-family: var(--epcl-font-family, sans-serif); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: #6b6360; white-space: nowrap; flex-shrink: 0; }
    #tbi-events .ev-pick-select { padding: 7px 14px; border-radius: 8px; border: 1px solid #d4cec4; background: #fff; font-family: var(--epcl-font-family, 'Quattrocento Sans', sans-serif); font-size: 14px; color: #1E1B1B; cursor: pointer; outline: none; transition: border-color 200ms ease; min-width: 100px; }
    #tbi-events .ev-pick-select:focus { border-color: var(--epcl-secondary-color, #FFD682); }
    #tbi-events .ev-pick-select:disabled { opacity: 0.45; cursor: default; }
    #tbi-events .ev-pick-clear { padding: 6px 14px; border-radius: 100px; border: 1px solid #d4cec4; background: #fff; font-family: var(--epcl-font-family, sans-serif); font-size: 13px; font-weight: 600; color: #6b6360; cursor: pointer; transition: all 200ms ease; }
    #tbi-events .ev-pick-clear:hover { background: #ede3d5; border-color: #bbb; color: #1E1B1B; }
    #tbi-events .ev-date-header { max-width: 1050px; box-sizing: border-box; margin: 18px auto 8px; padding: 0 4px; }
    #tbi-events .ev-date-label { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #6b6360; }
    #tbi-events .ev-featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 24px; }
    #tbi-events .ev-fcard { position: relative; z-index: 2; cursor: pointer; border-radius: 10px; overflow: hidden; text-decoration: none; }
    #tbi-events .ev-fcard .ev-border-deco { display: none; }
    #tbi-events .ev-fcard:hover .ev-border-deco { display: none; }
    #tbi-events .ev-fcard .ev-sidebar { display: none; }
    #tbi-events .ev-fcard:hover .ev-sidebar { display: none; }
    #tbi-events .ev-fcard .ev-fimg { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1 / 1; background: #111; }
    #tbi-events .ev-fcard .ev-fimg img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0.45; transition: opacity 0.4s, transform 0.6s; }
    #tbi-events .ev-fcard:hover .ev-fimg img { opacity: 0.6; transform: scale(1.03); }
    #tbi-events .ev-fcard .ev-foverlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 50px 24px 20px; z-index: 2; background: linear-gradient(transparent, rgba(0,0,0,0.85)); }
    #tbi-events .ev-fcard .ev-foverlay h2 { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-size: 22px; font-weight: 800; color: #f5f0e8; line-height: 1.3; margin: 8px 0 0; }
    #tbi-events .ev-fcard .ev-foverlay p { font-family: Georgia, serif; font-size: 14px; color: #ddd8d0; line-height: 1.55; margin: 10px 0 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #tbi-events .ev-fcard .ev-fmeta { display: flex; gap: 10px; margin-top: 12px; font-family: var(--epcl-font-family, sans-serif); font-size: 12px; color: rgba(255,255,255,0.5); }
    #tbi-events .ev-badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 10px; font-family: var(--epcl-font-family, sans-serif); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; line-height: 1.4; }
    #tbi-events .ev-badge.blue { background: #0077b6; }
    #tbi-events .ev-badge.red { background: #e63946; }
    #tbi-events .ev-badge.gold { background: var(--epcl-secondary-color, #FFD682); color: var(--epcl-titles-color, #1E1B1B); }
    #tbi-events .ev-foverlay .ev-badge { color: #1E1B1B !important; font-weight: 700; }
    #tbi-events .ev-catpill { display: inline-block; padding: 3px 12px; border-radius: 100px; font-size: 12px; font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 600; color: var(--epcl-titles-color, #1E1B1B); border: 1px solid var(--epcl-border-color, #707070); white-space: nowrap; transition: all 250ms ease; }
    #tbi-events .ev-catpill:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.1); transform: translateY(-1px); }
    #tbi-events .ev-list { max-width: 1050px; box-sizing: border-box; margin: 20px auto 0; padding-bottom: 80px; }
    #tbi-events .ev-row { display: flex; gap: 16px; align-items: center; padding: 12px 16px; border-bottom: none; cursor: pointer; transition: all 200ms ease; border-radius: 8px; text-decoration: none; color: inherit; }
    #tbi-events .ev-row-alt { background: #ede3d5; }
    #tbi-events .ev-row:hover { background: rgba(255,214,130,0.18); margin: 0; padding-left: 16px; padding-right: 16px; }
    #tbi-events .ev-row .ev-thumb { flex-shrink: 0; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; }
    #tbi-events .ev-row .ev-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #tbi-events .ev-row .ev-info { flex: 1; min-width: 0; }
    #tbi-events .ev-row .ev-catpill { display: inline-block; font-family: var(--epcl-font-family, sans-serif); font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 10px; border-radius: 12px; color: #1E1B1B; margin-bottom: 2px; }
    #tbi-events .ev-row .ev-info h3 { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 800; font-size: 16px; line-height: 1.3; color: var(--epcl-titles-color, #1E1B1B); margin: 2px 0; }
    #tbi-events .ev-row .ev-meta { font-family: var(--epcl-font-family, sans-serif); font-size: 13px; color: #888; margin-top: 2px; }
    #tbi-events .ev-row .ev-right { flex-shrink: 0; text-align: right; min-width: 80px; }
    #tbi-events .ev-row .ev-price { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-weight: 700; font-size: 14px; margin-top: 6px; }
    #tbi-events .ev-row .ev-price.free { color: #0077b6; }
    #tbi-events .ev-row .ev-price.soldout { color: #e63946; font-weight: 600; }
    #tbi-events .ev-empty { text-align: center; padding: 80px 20px; color: #999; }
    #tbi-events .ev-empty h3 { font-family: var(--epcl-title-font-family, 'Playfair Display', serif); font-size: 22px; font-weight: 800; color: var(--epcl-titles-color, #1E1B1B); }
    #tbi-events .ev-footer { text-align: center; padding: 0 20px 40px; font-size: 13px; color: #999; }
    #tbi-events .ev-featured-wrap { max-width: 1050px; box-sizing: border-box; margin: 0 auto 12px; background: #ede3d5; border: 1px solid #1E1B1B; border-radius: 16px; padding: 36px 60px 32px; position: relative; }
    #tbi-events .ev-featured-label { position: absolute; top: -14px; left: 24px; background: #f9e2af; color: #1E1B1B; font-family: var(--epcl-font-family, sans-serif); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 14px; border: 1px solid #1E1B1B; border-radius: 20px; z-index: 2; }
    #tbi-events .ev-pagination { max-width: 1050px; margin: 0 auto; padding: 20px 0 10px; text-align: center; }
    #tbi-events .ev-pag-inner { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    #tbi-events .ev-pag-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 36px; padding: 0 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-family: var(--epcl-font-family, sans-serif); font-size: 14px; font-weight: 600; color: #1E1B1B; transition: all 200ms ease; }
    #tbi-events .ev-pag-btn:hover:not(.disabled):not(.active) { background: #ede3d5; border-color: #ccc; }
    #tbi-events .ev-pag-btn.active { background: #1E1B1B; color: #f5f0e8; border-color: #1E1B1B; }
    #tbi-events .ev-pag-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    #tbi-events .ev-pag-dots { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 36px; font-size: 14px; color: #999; letter-spacing: 1px; }
    #tbi-events .ev-pag-info { font-family: var(--epcl-font-family, sans-serif); font-size: 13px; color: #999; margin-top: 10px; }

    /* Responsive — exact from Ghost injection */
    @media (max-width: 1200px) {
      #tbi-events .ev-featured-grid { grid-template-columns: repeat(2, 1fr); gap: 0 30px; }
    }
    @media (max-width: 900px) {
      #tbi-events .ev-featured-grid { grid-template-columns: 1fr; gap: 20px 0; }
      #tbi-events .ev-fcard { margin-left: 0; }
      #tbi-events .ev-fcard .ev-sidebar { display: none; }
      #tbi-events .ev-fcard .ev-border-deco { display: none; }
      #tbi-events .ev-header h1 { font-size: 30px; }
    }
    @media (max-width: 700px) {
      #tbi-events .ev-filter-row { flex-direction: column; gap: 10px; align-items: center; }
      #tbi-events .ev-search { max-width: 100%; width: 100%; }
      #tbi-events .ev-filter-label { text-align: center; }
      #tbi-events .ev-section-head { flex-wrap: wrap; gap: 8px 12px; }
      #tbi-events .ev-section-head .ev-loc-tab { font-size: 18px; }
      #tbi-events .ev-section-head .ev-month-pill { font-size: 13px; padding: 5px 12px; }
      #tbi-events .ev-line { display: none; }
      #tbi-events .ev-section-head .ev-month-pill:first-of-type { margin-left: 0; }
      #tbi-events .ev-section-head .ev-loc-tab:last-of-type { margin-right: auto; }
      #tbi-events .ev-date-picker { flex-wrap: wrap; gap: 8px; }
      #tbi-events .ev-pick-select { min-width: 0; flex: 1; }
      #tbi-events .ev-featured-wrap { padding: 36px 40px 32px !important; }
      #tbi-events .ev-featured-label { left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; padding: 4px 10px; }
      #tbi-events .ev-pag-btn { min-width: 32px; height: 32px; font-size: 13px; }
    }
    @media (max-width: 600px) {
      #tbi-events .ev-row { flex-wrap: wrap; }
      #tbi-events .ev-row .ev-right { text-align: left; min-width: auto; width: 100%; display: flex; gap: 12px; align-items: center; padding-top: 8px; flex-wrap: wrap; }
      #tbi-events .ev-header h1 { font-size: 26px; }
      #tbi-events .ev-fcard .ev-foverlay h2 { font-size: 18px; }
    }

    /* Skeleton */
    @keyframes ev-shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    #tbi-events .ev-skeleton-block { background: linear-gradient(90deg, #ede3d5 25%, #f5ece0 50%, #ede3d5 75%); background-size: 800px 100%; animation: ev-shimmer 1.5s infinite ease-in-out; border-radius: 8px; }
    #tbi-events .ev-skeleton-pills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    #tbi-events .ev-skeleton-pill { height: 32px; width: 90px; border-radius: 100px; }
    #tbi-events .ev-skeleton-featured { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    #tbi-events .ev-skeleton-fcard { height: 200px; border-radius: 12px; }
    #tbi-events .ev-skeleton-row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.05); max-width: 1050px; margin: 0 auto; }
    #tbi-events .ev-skeleton-thumb { width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0; }
    #tbi-events .ev-skeleton-text { flex: 1; }
    #tbi-events .ev-skeleton-line { height: 14px; margin-bottom: 8px; border-radius: 4px; }
    #tbi-events .ev-skeleton-line.w70 { width: 70%; }
    #tbi-events .ev-skeleton-line.w50 { width: 50%; }
    @media (max-width: 700px) {
      #tbi-events .ev-skeleton-featured { grid-template-columns: 1fr; }
      #tbi-events .ev-skeleton-fcard { height: 160px; }
    }

    /* ============================================
       EVENT DETAIL PAGE STYLES
       ============================================ */
    #tbi-events .ev-post {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 16px;
      font-family: var(--epcl-font-family);
    }
    #tbi-events .ev-post-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgb(221, 213, 203);
      margin-bottom: 28px;
    }
    #tbi-events .ev-post-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    #tbi-events .ev-post-topbar a {
      font-size: 14px;
      color: rgb(102,102,102);
      text-decoration: none;
      transition: 0.2s;
    }
    #tbi-events .ev-post-topbar a:hover { color: #1E1B1B; }
    #tbi-events .ev-post-hero {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    #tbi-events .ev-post-image {
      flex: 0 0 45%;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: rgb(214, 207, 198);
    }
    #tbi-events .ev-post-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    #tbi-events .ev-post-details {
      flex: 1 1 0%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #tbi-events .ev-post-cat {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #1E1B1B;
      letter-spacing: 0.02em;
      align-self: flex-start;
    }
    #tbi-events .ev-post-title {
      font-family: var(--epcl-title-font-family);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--epcl-titles-color);
      margin: 4px 0;
    }
    #tbi-events .ev-post-detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 4px 0;
    }
    #tbi-events .ev-post-detail-icon {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }
    #tbi-events .ev-post-title { display: none; }
    #tbi-events .ev-post-detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgb(122, 114, 105);
      margin-bottom: 1px;
    }
    #tbi-events .ev-post-detail-value {
      font-size: 15px;
      font-weight: 500;
      color: #1E1B1B;
      line-height: 1.35;
    }
    #tbi-events .ev-post-detail-value.free { color: rgb(45, 138, 78); font-weight: 700; }
    #tbi-events .ev-post-detail-value.soldout { color: rgb(230, 57, 70); font-weight: 700; }
    #tbi-events .ev-post-cta {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 28px;
      background: rgb(166, 227, 161);
      color: #1E1B1B !important;
      text-decoration: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      transition: 200ms;
      align-self: flex-start;
      cursor: pointer;
      border: none;
      letter-spacing: 0.02em;
    }
    #tbi-events .ev-post-cta:hover {
      background: rgb(148, 217, 144);
      transform: translateY(-1px);
    }
    #tbi-events .ev-post-cta.soldout {

    Object.keys(availableDates).forEach(function(mk) {
      availableDates[mk] = Object.keys(availableDates[mk]).map(Number).sort(function(a,b){ return a - b; });
    });
    /* Section head: location tabs + month pills */
    var secHtml = '<div class="ev-section-head">';
    secHtml += '<h2 class="ev-loc-tab ev-loc-inactive" data-loc="all">All Events</h2>';
    secHtml += '<h2 class="ev-loc-tab" data-loc="sf">SF Events</h2>';
    secHtml += '<h2 class="ev-loc-tab ev-loc-inactive" data-loc="oakland">Oakland Events</h2>';
    if (monthOrder.length > 0) {
      monthOrder.forEach(function(monthKey, idx) {
        var monthData = monthSet[monthKey];
        var label = getMonthLabel(monthData);
        secHtml += '<button class="ev-month-pill' + (idx === 0 ? ' active' : '') + '" data-month="' + esc(monthKey) + '">' + esc(label) + '</button>';
      });
    }
    secHtml += '<div class="ev-line"></div>';
    secHtml += '</div>';
    root.insertAdjacentHTML('beforeend', secHtml);
    /* Date picker */
    var datePickerHtml = '<div class="ev-date-picker">';
    datePickerHtml += '<span class="ev-datepicker-label">Jump to date:</span>';
    datePickerHtml += '<select id="ev-pick-month" class="ev-pick-select"><option value="">Month</option>';
    monthOrder.forEach(function(monthKey) {
      var md = monthSet[monthKey];
      datePickerHtml += '<option value="' + esc(monthKey) + '">' + esc(md.monthName) + '</option>';
    });
    datePickerHtml += '</select>';
    datePickerHtml += '<select id="ev-pick-day" class="ev-pick-select" disabled><option value="">Day</option></select>';
    datePickerHtml += '<button id="ev-pick-clear" class="ev-pick-clear" style="display:none;">Clear</button>';
    datePickerHtml += '</div>';
    root.insertAdjacentHTML('beforeend', datePickerHtml);
    /* Event list grouped by date */
    var dateGroups = [];
    var dateMap = {};
    events.forEach(function(ev) {
      var d = ev.date || 'Date TBD';
      if (!dateMap[d]) { dateMap[d] = []; dateGroups.push(d); }
      dateMap[d].push(ev);
    });
    var listHtml = '<div class="ev-list" id="ev-list">';
    var globalIdx = 0;
    dateGroups.forEach(function(dateStr) {
      var firstEvent = dateMap[dateStr][0];
      var monthKey = firstEvent && firstEvent.monthData ? firstEvent.monthData.key : 'unknown';
      var sortKey = firstEvent && firstEvent.monthData ? firstEvent.monthData.sortKey : 'unknown';
      listHtml += '<div class="ev-date-header" data-date="' + esc(dateStr) + '" data-month="' + esc(monthKey) + '" data-sortkey="' + esc(sortKey) + '"><span class="ev-date-label">' + esc(dateStr).toUpperCase() + '</span></div>';
      dateMap[dateStr].forEach(function(ev) {
        listHtml += renderEventRow(ev, globalIdx);
        globalIdx++;
      });
    });
    listHtml += '</div>';
    root.insertAdjacentHTML('beforeend', listHtml);
    root.insertAdjacentHTML('beforeend', '<div class="ev-pagination" id="ev-pagination"></div>');
    root.insertAdjacentHTML('beforeend', '<div class="ev-footer"><p>Events are updated daily. Details may change\u2014check the venue for latest info.</p></div>');
    wireFilters(events, availableDates);
    wireSPALinks();
  }
  function renderEventRow(ev, idx) {
    var monthKey = ev.monthData ? ev.monthData.key : 'unknown';
    var sortKey = ev.monthData ? ev.monthData.sortKey : 'unknown';
    var rowClass = 'ev-row' + (idx % 2 === 1 ? ' ev-row-alt' : '');
    var html = '<a href="' + esc(ev.url) + '" class="' + rowClass + '" data-slug="' + esc(ev.slug) + '" data-cat="' + esc(ev.category) + '" data-city="' + esc(ev.city) + '" data-date="' + esc(ev.date || 'Date TBD') + '" data-month="' + esc(monthKey) + '" data-sortkey="' + esc(sortKey) + '">';
    var fallbackImg = CATEGORY_IMAGES[ev.category] || CATEGORY_IMAGES['Events'];
    html += '<div class="ev-thumb"><img src="' + esc(ev.image) + '" alt="" onerror="this.onerror=null;this.src=\'' + esc(fallbackImg) + '\';"></div>';
    html += '<div class="ev-info">';
    if (ev.category !== 'Events') {
      html += '<span class="ev-catpill" style="background:' + ev.catColor + '">' + esc(ev.category) + '</span>';
    }
    html += '<h3>' + esc(ev.title) + '</h3>';
    html += '<div class="ev-meta">' + esc(ev.date) + (ev.time ? ' \u00b7 ' + esc(ev.time) : '');
    if (ev.venue) html += ' \u00b7 ' + esc(ev.venue);
    html += '</div></div>';
    html += '<div class="ev-right">';
    html += priceHTML(ev.price, ev.isSoldOut);
    html += '</div></a>';
    return html;
  }
  /* ---------- filters, search, pagination & date picker (exact from Ghost) ---------- */
  function wireFilters(events, availableDates) {
    var activeCat = 'all';
    var activeLoc = 'sf';
    var firstMonthPill = document.querySelector('.ev-month-pill');
    var activeMonth = firstMonthPill ? firstMonthPill.getAttribute('data-month') : 'all';
    var searchTerm = '';
    var currentPage = 1;
    var activeDate = '';
    function applyFilters() {
      var rows = document.querySelectorAll('.ev-row');
      var matchingRows = [];
      var matchingDates = {};
      rows.forEach(function(row) {
        var cat = row.getAttribute('data-cat');
        var city = row.getAttribute('data-city');
        var dateStr = row.getAttribute('data-date');
        var month = row.getAttribute('data-month');
        var sortkey = row.getAttribute('data-sortkey');
        var text = row.textContent.toLowerCase();
        var catMatch = activeCat === 'all' || cat === activeCat;
        var locMatch = activeLoc === 'all' || city === activeLoc;
        var searchMatch = !searchTerm || text.indexOf(searchTerm.toLowerCase()) !== -1;
        var monthMatch = activeMonth === 'all' || month === activeMonth;
        var dateMatch = !activeDate || sortkey === activeDate;
        if (catMatch && locMatch && searchMatch && monthMatch && dateMatch) {
          matchingRows.push({ row: row, dateStr: dateStr });
          matchingDates[dateStr] = true;
        } else {
          row.style.display = 'none';
        }
      });
      var totalMatching = matchingRows.length;
      var totalPages = Math.ceil(totalMatching / EVENTS_PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages || 1;
      var startIdx = (currentPage - 1) * EVENTS_PER_PAGE;
      var endIdx = startIdx + EVENTS_PER_PAGE;
      var pageVisibleDates = {};
      var visIdx = 0;
      matchingRows.forEach(function(item, idx) {
        if (idx >= startIdx && idx < endIdx) {
          item.row.style.display = '';
          item.row.classList.toggle('ev-row-alt', visIdx % 2 === 1);
          pageVisibleDates[item.dateStr] = true;
          visIdx++;
        } else {
          item.row.style.display = 'none';
        }
      });
      document.querySelectorAll('.ev-date-header').forEach(function(hdr) {
        var d = hdr.getAttribute('data-date');
        hdr.style.display = pageVisibleDates[d] ? '' : 'none';
      });
      var emptyEl = document.querySelector('.ev-empty');
      if (totalMatching === 0 && !emptyEl) {
        var list = document.getElementById('ev-list');
        if (list) list.insertAdjacentHTML('afterend', '<div class="ev-empty"><p>No events match your filters.</p></div>');
      } else if (totalMatching > 0 && emptyEl) {
        emptyEl.remove();
      }
      renderPagination(currentPage, totalPages, totalMatching);
    }
    function renderPagination(page, totalPages, totalItems) {
      var pagEl = document.getElementById('ev-pagination');
      if (!pagEl) return;
      if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
      var html = '<div class="ev-pag-inner">';
      html += '<button class="ev-pag-btn' + (page <= 1 ? ' disabled' : '') + '" data-page="' + (page - 1) + '">\u00ab Prev</button>';
      for (var p = 1; p <= totalPages; p++) {
        if (totalPages > 7) {
          if (p === 1 || p === totalPages || (p >= page - 1 && p <= page + 1)) {
            html += '<button class="ev-pag-btn' + (p === page ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
          } else if (p === page - 2 || p === page + 2) {
            html += '<span class="ev-pag-dots">\u2026</span>';
          }
        } else {
          html += '<button class="ev-pag-btn' + (p === page ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
        }
      }
      html += '<button class="ev-pag-btn' + (page >= totalPages ? ' disabled' : '') + '" data-page="' + (page + 1) + '">Next \u00bb</button>';
      html += '</div>';
      html += '<div class="ev-pag-info">Showing ' + (((page-1)*EVENTS_PER_PAGE)+1) + '\u2013' + Math.min(page*EVENTS_PER_PAGE, totalItems) + ' of ' + totalItems + ' events</div>';
      pagEl.innerHTML = html;
      pagEl.querySelectorAll('.ev-pag-btn:not(.disabled)').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var newPage = parseInt(btn.getAttribute('data-page'));
          if (newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            applyFilters();
            var secHead = document.querySelector('.ev-section-head');
            if (secHead) secHead.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    }
    function resetPageAndFilter() { currentPage = 1; applyFilters(); }
    document.querySelectorAll('.ev-cattab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.ev-cattab').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeCat = btn.getAttribute('data-cat');
        resetPageAndFilter();
      });
    });
    document.querySelectorAll('.ev-loc-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.ev-loc-tab').forEach(function(t) { t.classList.add('ev-loc-inactive'); });
        tab.classList.remove('ev-loc-inactive');
        activeLoc = tab.getAttribute('data-loc');
        resetPageAndFilter();
      });
    });
    document.querySelectorAll('.ev-month-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        var clickedMonth = pill.getAttribute('data-month');
        if (activeMonth === clickedMonth) {
          pill.classList.remove('active');
          activeMonth = 'all';
        } else {
          document.querySelectorAll('.ev-month-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          activeMonth = clickedMonth;
        }
        activeDate = '';
        var pickMonth = document.getElementById('ev-pick-month');
        var pickDay = document.getElementById('ev-pick-day');
        var pickClear = document.getElementById('ev-pick-clear');
        if (pickMonth) pickMonth.value = '';
        if (pickDay) { pickDay.innerHTML = '<option value="">Day</option>'; pickDay.disabled = true; }
        if (pickClear) pickClear.style.display = 'none';
        resetPageAndFilter();
      });
    });
    var searchInput = document.getElementById('ev-search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        searchTerm = searchInput.value;
        resetPageAndFilter();
      });
    }
    var pickMonth = document.getElementById('ev-pick-month');
    var pickDay = document.getElementById('ev-pick-day');
    var pickClear = document.getElementById('ev-pick-clear');
    if (pickMonth) {
      pickMonth.addEventListener('change', function() {
        var selectedMonth = pickMonth.value;
        if (!selectedMonth) {
          pickDay.innerHTML = '<option value="">Day</option>';
          pickDay.disabled = true;
          activeDate = '';
          pickClear.style.display = 'none';
          resetPageAndFilter();
          return;
        }
        var days = availableDates[selectedMonth] || [];
        pickDay.innerHTML = '<option value="">Day</option>';
        days.forEach(function(d) { pickDay.innerHTML += '<option value="' + d + '">' + d + '</option>'; });
        pickDay.disabled = false;
        activeMonth = selectedMonth;
        document.querySelectorAll('.ev-month-pill').forEach(function(p) { p.classList.remove('active'); });
        var matchPill = document.querySelector('.ev-month-pill[data-month="' + selectedMonth + '"]');
        if (matchPill) matchPill.classList.add('active');
        activeDate = '';
        pickClear.style.display = 'inline-block';
        resetPageAndFilter();
      });
    }
    if (pickDay) {
      pickDay.addEventListener('change', function() {
        var selectedDay = pickDay.value;
        var selectedMonth = pickMonth.value;
        if (!selectedDay || !selectedMonth) { activeDate = ''; resetPageAndFilter(); return; }
        activeDate = selectedMonth + '-' + String(selectedDay).padStart(2, '0');
        pickClear.style.display = 'inline-block';
        resetPageAndFilter();
      });
    }
    if (pickClear) {
      pickClear.addEventListener('click', function() {
        pickMonth.value = '';
        pickDay.innerHTML = '<option value="">Day</option>';
        pickDay.disabled = true;
        activeDate = '';
        pickClear.style.display = 'none';
        var fp = document.querySelector('.ev-month-pill');
        if (fp) {
          document.querySelectorAll('.ev-month-pill').forEach(function(p) { p.classList.remove('active'); });
          fp.classList.add('active');
          activeMonth = fp.getAttribute('data-month');
        } else { activeMonth = 'all'; }
        resetPageAndFilter();
      });
    }
    applyFilters();
  }
  /* ---------- SPA routing ---------- */
  function wireSPALinks() {
    document.getElementById('tbi-events').addEventListener('click', function(e) {
      var link = e.target.closest('a[data-slug]');
      if (!link) return;
      /* Skip external links (e.g. Ghost featured posts) — let browser handle them */
      var href = link.getAttribute('href') || '';
      if (href.indexOf('http') === 0) return;
      e.preventDefault();
      var slug = link.getAttribute('data-slug');
      history.pushState({ slug: slug }, '', '/' + slug + '/');
      loadDetailPage(slug);
    });
  }
  function loadDetailPage(slug) {
    var root = document.getElementById('tbi-events');
    root.innerHTML = '<div class="ev-post" style="text-align:center;padding:80px 20px;"><p>Loading event...</p></div>';
    fetchEventBySlug(slug).then(function(event) {
      if (event) {
        document.title = event.title + ' — The Bold Italic';
        renderEventPage(event);
      } else {
        root.innerHTML = '<div class="ev-post"><p>Event not found. <a href="/" class="ev-post-back">\u2190 Back to events</a></p></div>';
      }
    }).catch(function() {
      root.innerHTML = '<div class="ev-post"><p>Error loading event. <a href="/" class="ev-post-back">\u2190 Back to events</a></p></div>';
    });
  }
  function renderEventPage(event) {
    var root = document.getElementById('tbi-events');
    var catColor = CATEGORY_COLORS[event.category] || CATEGORY_COLORS['Events'] || '#cdd6f4';
    var detailDate = formatDetailDate(event);
    var detailTime = event.time || '';

    /* Detect real image vs placeholder — match live Ghost site logic exactly */
    var imgSrc = event.image_url || '';
    var hasRealImage = imgSrc && imgSrc.indexOf('data:image/svg') === -1 && imgSrc.indexOf('unsplash.com') === -1;
    var noImageClass = hasRealImage ? '' : ' no-image';

    var headerPillText = 'EVENT IN SAN FRANCISCO';
    var cityLower = (event.city || '').toLowerCase();
    if (cityLower === 'oakland') {
      headerPillText = 'EVENT IN OAKLAND';
    } else if (cityLower !== 'sf' && cityLower !== 'san francisco' && cityLower !== '') {
      headerPillText = 'EVENT IN ' + event.city.toUpperCase();
    } else {
      var inferred = inferCity(event);
      if (inferred) headerPillText = 'EVENT IN ' + inferred;
    }

    var ctaHTML = '';
    if (event.sold_out) {
      ctaHTML = '<span class="ev-post-cta soldout">Sold Out</span>';

      ctaHTML = '<a class="ev-post-cta" href="' + esc(event.ticketUrl) + '" target="_blank" rel="noopener">More Info &amp; Tickets \u2192</a>';
    } else if (event.source_url) {
      ctaHTML = '<a class="ev-post-cta" href="' + esc(event.source_url) + '" target="_blank" rel="noopener">More Info \u2192</a>';
    }

    var html = '<div class="ev-post">';
    /* Header with pill */
    html += '<div class="ev-post-header">';
    html += '<div class="ev-post-header-line"><span class="ev-post-header-pill">' + esc(headerPillText) + '</span></div>';
    html += '<div class="ev-post-header-date">' + esc(detailDate) + '</div>';
    html += '<h1 class="ev-post-header-title">' + esc(event.title) + '</h1>';
    html += '</div>';

    /* Card */
    html += '<div class="ev-post-card' + noImageClass + '">';
    html += '<div class="ev-post-topbar">';
    if (event.category && event.category.toLowerCase() !== 'events') {
      html += '<span class="ev-post-cat" style="background: ' + catColor + '">' + esc(event.category) + '</span>';
    }
    html += '<a href="/">\u2190 All Events</a>';
    html += '</div>';
    html += '<div class="ev-post-hero">';
    if (hasRealImage) {
      html += '<div class="ev-post-image"><img src="' + esc(imgSrc) + '" alt="' + esc(event.title) + '"></div>';
    }
    html += '<div class="ev-post-details">';
    /* Date */
    html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83d\udcc5</div><div><div class="ev-post-detail-label">Date</div><div class="ev-post-detail-value">' + esc(detailDate) + '</div></div></div>';
    /* Time */
    if (detailTime) {
      html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83d\udd51</div><div><div class="ev-post-detail-label">Time</div><div class="ev-post-detail-value">' + esc(detailTime) + '</div></div></div>';
    }
    /* Venue / Location */
    if (event.venue) {
      html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83d\udccd</div><div><div class="ev-post-detail-label">Location</div><div class="ev-post-detail-value">' + esc(event.venue) + '</div></div></div>';
    }
    /* Address */
    if (event.address) {
      html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83c\udfe0</div><div><div class="ev-post-detail-label">Address</div><div class="ev-post-detail-value">' + esc(event.address) + '</div></div></div>';
    }
    /* Neighborhood */
    if (event.neighborhood) {
      html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83c\udfd8</div><div><div class="ev-post-detail-label">Neighborhood</div><div class="ev-post-detail-value">' + esc(event.neighborhood) + '</div></div></div>';
    }
    /* Performers — parse JSON array if stored as ["name1","name2"] */
    if (event.performers) {
      var performersDisplay = event.performers;
      try {
        var parsed = JSON.parse(event.performers);
        if (Array.isArray(parsed)) performersDisplay = parsed.join(', ');
      } catch(e) {}
      html += '<div class="ev-post-detail-row"><div class="ev-post-detail-icon">\ud83c\udfb5</div><div><div class="ev-post-detail-label">Performers</div><div class="ev-post-detail-value">' + esc(performersDisplay) + '</div></div></div>';

    if (event.price) {

      html += '<div class="ev-post-body">';
      var paragraphs = event.description.split('\n');
      for (var i = 0; i < paragraphs.length; i++) {
        if (paragraphs[i].trim()) {
          html += '<p>' + esc(paragraphs[i]) + '</p>';
        }
      }
      html += '</div>';
    }

    /* Source */
    if (event.source_name || event.source_url) {
      var srcUrl = getSourceUrl(event);
      html += '<div class="ev-post-source">See this event also on ';

        html += '<a href="' + esc(srcUrl) + '" target="_blank" rel="noopener">' + esc(event.source_name) + '</a>';
      } else if (srcUrl) {
        html += '<a href="' + esc(srcUrl) + '" target="_blank" rel="noopener">' + esc(srcUrl) + '</a>';
      } else {
        html += esc(event.source_name);
      }
      html += '.\n      Details may change \u2014 check the venue for latest info.</div>';
    }

    /* Back button */
    html += '<div class="ev-post-back"><a href="/">Browse All SF Events</a></div>';
    html += '</div>';

    root.innerHTML = html;

    /* Wire back links */
    root.querySelectorAll('a[href="/"]').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        history.pushState({}, '', '/');
        document.title = 'What\u2019s Happening in SF \u2014 The Bold Italic';
        initListPage();
      });
    });
  }
  /* ---------- skeleton ---------- */

  /* ---------- init ---------- */
  async function initListPage() {
    try {
      renderSkeleton();
      var events = await fetchEvents();
      var featured = await fetchFeaturedFromGhost();
      renderPage(events, featured);
    } catch (err) {
      console.error('TBI Events page error:', err);
      var root = document.getElementById('tbi-events');
      if (root) root.innerHTML += '<div class="ev-empty"><p>Unable to load events. Please try again later.</p></div>';
    }
  }
  function route() {
    var path = location.pathname.replace(/^\/+|\/+$/g, '');
    if (!path || path === 'index.html') {
      document.title = 'What\u2019s Happening in SF \u2014 The Bold Italic';
      initListPage();
    } else {
      loadDetailPage(path);
    }
  }
  window.addEventListener('popstate', function() { route(); });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', route);
  } else {
    route();
  }
})();
</script>
